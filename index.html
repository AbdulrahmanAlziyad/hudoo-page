<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هدوء — قريبًا</title>
<meta name="description" content="أول ما توصل بطانية هدوء، بتكون أول من يعرف.">

<!-- خط ألمراي للعربي + أوتفِت للأرقام -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --midnight-navy: #171F3F;
    --dusk-navy: #2A3354;
    --moonlight-silver: #B8C5D6;
    --warm-ivory: #F5F1EA;
    --near-black: #1A1A1A;
    --silver-glow: rgba(184, 197, 214, 0.15);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Almarai', sans-serif;
    background: var(--midnight-navy);
    color: var(--warm-ivory);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 24px;
    text-align: center;
  }

  /* خلفية ليلية متدرجة — عمق بدل لون مسطح */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(42, 51, 84, 0.6), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(184, 197, 214, 0.06), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* نقاط ضوء خافتة كأنها نجوم بعيدة */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(184, 197, 214, 0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(184, 197, 214, 0.3), transparent),
      radial-gradient(1px 1px at 85% 20%, rgba(184, 197, 214, 0.35), transparent),
      radial-gradient(1px 1px at 35% 80%, rgba(184, 197, 214, 0.25), transparent),
      radial-gradient(1px 1px at 75% 45%, rgba(184, 197, 214, 0.3), transparent);
    pointer-events: none;
    z-index: 0;
    animation: twinkle 8s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* الشعار */
  .logo-img {
    width: 150px;
    height: auto;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
  }

  .headline {
    font-family: 'Almarai', sans-serif;
    font-weight: 700;
    font-size: 26px;
    line-height: 1.8;
    color: var(--warm-ivory);
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }

  .subline {
    font-family: 'Almarai', sans-serif;
    font-weight: 300;
    font-size: 16px;
    line-height: 1.9;
    color: rgba(245, 241, 234, 0.7);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 1s ease 0.8s forwards;
  }

  /* نموذج الإدخال */
  .form-wrap {
    width: 100%;
    opacity: 0;
    animation: fadeUp 1s ease 1s forwards;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .phone-input {
    width: 100%;
    background: var(--dusk-navy);
    border: 1px solid rgba(184, 197, 214, 0.2);
    border-radius: 8px;
    padding: 18px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--warm-ivory);
    text-align: center;
    letter-spacing: 1px;
    direction: ltr;
    transition: border-color 0.3s ease, background 0.3s ease;
    outline: none;
  }

  .phone-input::placeholder {
    color: rgba(184, 197, 214, 0.4);
    font-family: 'Almarai', sans-serif;
    letter-spacing: 0;
  }

  .phone-input:focus {
    border-color: var(--moonlight-silver);
    background: #313b60;
  }

  .submit-btn {
    width: 100%;
    background: var(--moonlight-silver);
    color: var(--midnight-navy);
    border: none;
    border-radius: 4px;
    padding: 18px 20px;
    font-family: 'Almarai', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.3s ease, background 0.3s ease;
  }

  .submit-btn:hover {
    background: #c8d3e0;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(184, 197, 214, 0.25);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* رسالة النجاح */
  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.8s ease forwards;
  }

  .success.show {
    display: flex;
  }

  .form-wrap.hide {
    display: none;
  }

  .success-icon {
    width: 56px;
    height: 56px;
    margin-bottom: 4px;
  }

  .success-title {
    font-family: 'Almarai', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--warm-ivory);
  }

  .success-text {
    font-family: 'Almarai', sans-serif;
    font-weight: 300;
    font-size: 16px;
    line-height: 1.8;
    color: rgba(245, 241, 234, 0.7);
  }

  .error-msg {
    color: #d99;
    font-size: 14px;
    font-weight: 300;
    margin-top: 12px;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .error-msg.show {
    opacity: 1;
  }

  /* تذييل */
  .footer {
    position: relative;
    z-index: 1;
    margin-top: 56px;
    font-family: 'Almarai', sans-serif;
    font-weight: 300;
    font-size: 13px;
    color: rgba(184, 197, 214, 0.4);
    letter-spacing: 0.5px;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (max-width: 420px) {
    .logo { font-size: 46px; }
    .headline { font-size: 22px; }
  }
</style>
</head>

    <h1 class="headline">أول ما توصل بطانية هدوء، بتكون أول من يعرف.</h1>
    <p class="subline">سجّل رقمك، ونرسل لك أول ما تنزل. بدون إزعاج، بس خبر الإطلاق.</p>

    <!-- النموذج -->
    <div class="form-wrap" id="formWrap">
      <div class="input-group">
        <input
          type="tel"
          class="phone-input"
          id="phoneInput"
          placeholder="05XXXXXXXX"
          maxlength="10"
          inputmode="numeric"
          autocomplete="tel"
        >
        <button class="submit-btn" id="submitBtn">عطني خبر اذا نزلت</button>

      <div class="error-msg" id="errorMsg"></div>

      </svg>
      <div class="success-title">تم. رقمك معنا.</div>

  // ====== الإعدادات ======
  // ضع رابط ويب هوك إن إيت إن هنا بعد ما تنشئه
  const WEBHOOK_URL = 'https://n8n.hudooflow.com/webhook/8b057291-8a34-4dc0-9893-aab3c2cf2865';

  const phoneInput = document.getElementById('phoneInput');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const formWrap = document.getElementById('formWrap');
  const success = document.getElementById('success');

  // السماح بالأرقام فقط
  phoneInput.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
    hideError();
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function hideError() {
    errorMsg.classList.remove('show');
  }

  function validatePhone(phone) {
    // رقم سعودي: يبدأ بـ 05 و10 خانات
    return /^05[0-9]{8}$/.test(phone);
  }

  async function submit() {
    const phone = phoneInput.value.trim();

    if (!validatePhone(phone)) {
      showError('تأكد من الرقم — لازم يبدأ بـ 05 و10 خانات.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'لحظة…';

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone: phone,
          source: 'tiktok_waitlist',
          timestamp: new Date().toISOString()
        })
      });

      if (response.ok) {
        formWrap.classList.add('hide');
        success.classList.add('show');
      } else {
        throw new Error('failed');
      }
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'عطني خبر اذا نزلت';
      showError('صار خطأ بسيط. جرّب مرة ثانية.');
    }
  }

  submitBtn.addEventListener('click', submit);
  phoneInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submit();
  });
</script>

</body>
</html>
